<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku</title>

    <link rel="icon" href="data:," />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="sudoku.css" />
  </head>
  <body class="vw-100 vh-100 d-flex">
    <div class="w-100 d-flex flex-row justify-content-between align-items-center text-center game-wrapper">
      <!-- THE BOARD -->
      <div class="sudoku-board" id="board">
        <!-- JS will fill this -->
      </div>

      <div>
        <h1 class="text-white title">Sudoku</h1>

        <div class="lives" id="lives">
          <span id="life1">❤️</span>
          <span id="life2">❤️</span>
          <span id="life3">❤️</span>
        </div>

        <!-- DIFFICULTY -->
        <div class="difficulty">
          <button class="diff-btn active" id="easy">Easy</button>
          <button class="diff-btn" id="medium">Medium</button>
          <button class="diff-btn" id="hard">Hard</button>
        </div>

        <!-- POPUP -->
        <div class="popup-overlay" id="popup">
          <div class="popup-box">
            <div class="popup-emoji" id="popup-emoji"></div>
            <h2 class="popup-title" id="popup-title"></h2>
            <p class="popup-message" id="popup-message"></p>
            <button class="restart-btn" id="popup-restart">↺ Restart</button>
          </div>
        </div>

        <!-- RESTART -->
        <button class="restart-btn" id="restart">↺ Restart</button>
      </div>
    </div>

    <script src="sudoku.js"></script>
  </body>
</html>
